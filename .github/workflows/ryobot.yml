name: ryobot

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, edited, synchronize, closed]
  pull_request_review_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue/PR number to trigger bots on'
        required: false
        type: string
  schedule:
    - cron: "*/30 * * * *"

permissions:
  issues: write
  pull-requests: write
  actions: write
  contents: write

jobs:
  ryobot:
    uses: kcccn/ryobot/.github/workflows/ryobot.yml@main
    secrets: inherit